<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netcup Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #10121a;
    --surface:  #161921;
    --border:   #1f2332;
    --border2:  #272d3e;
    --text:     #c8cdd8;
    --muted:    #5d6480;
    --accent:   #6b9cf0;
    --green:    #4ec9a0;
    --red:      #e07070;
    --yellow:   #e8b84b;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ── Top bar ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .divider-v {
    width: 1px;
    height: 18px;
    background: var(--border2);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }

  .sort-select:focus { border-color: var(--accent); }

  .btn-refresh {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }

  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Summary bar ── */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .summary-item {
    background: var(--bg);
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .summary-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
  }

  .summary-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
  }

  .summary-value.green { color: var(--green); }
  .summary-value.red   { color: var(--red);   }
  .summary-value.blue  { color: var(--accent); }

  /* ── Main content ── */
  .main {
    padding: 16px 20px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Server grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px;
  }

  /* ── Server card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color .15s;
  }

  .card:hover { border-color: var(--border2); }

  .card.throttled {
    border-color: rgba(245, 96, 96, .35);
    background: linear-gradient(160deg, #1a1114 0%, var(--surface) 60%);
  }

  .card-head {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .card-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    word-break: break-all;
    line-height: 1.3;
  }

  .card-meta {
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .card-ip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .card-account {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    opacity: .8;
  }

  .tag {
    flex-shrink: 0;
    padding: 3px 9px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
  }

  .tag.normal   { background: rgba(52,211,153,.12); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
  .tag.throttled{ background: rgba(245,96,96,.12);  color: var(--red);   border: 1px solid rgba(245,96,96,.25);  }

  /* ── Traffic rows ── */
  .card-stats {
    padding: 12px 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .7px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  .stat-value.up   { color: var(--accent); }
  .stat-value.down { color: #a78bfa; }

  /* ── Throttle info ── */
  .card-throttle {
    padding: 10px 16px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }

  .tinfo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .tinfo-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
  }

  .tinfo-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tinfo-value.alert { color: var(--red); font-weight: 600; }
  .tinfo-value.dim   { color: var(--muted); }

  /* ── Server status row ── */
  .card-foot {
    padding: 7px 16px;
    background: rgba(255,255,255,.02);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .foot-status {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .foot-status .dot-status {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .dot-status.on  { background: var(--green); }
  .dot-status.off { background: var(--red); }

  .foot-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  /* ── Empty / Loading / Error states ── */
  .state-box {
    grid-column: 1 / -1;
    padding: 60px 20px;
    text-align: center;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
  }

  .state-box .loader {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Bottom bar ── */
  .bottombar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .countdown {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .countdown-bar {
    width: 60px;
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .5s linear;
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .topbar { padding: 0 12px; }

    .logo { font-size: 13px; }

    .summary {
      grid-template-columns: repeat(2, 1fr);
    }

    .summary-item { padding: 12px 14px; }

    .summary-value { font-size: 20px; }

    .main { padding: 12px 10px 56px; }

    .grid { grid-template-columns: 1fr; gap: 8px; }

    .sort-select { font-size: 10px; padding: 4px 7px; }

    .btn-refresh { display: none; }

    .bottombar { padding: 6px 12px; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-left">
    <span class="logo">NETCUP</span>
    <div class="divider-v"></div>
    <div class="status-pill">
      <span class="dot" id="liveDot"></span>
      <span id="liveLabel">LIVE</span>
    </div>
  </div>
  <div class="topbar-right">
    <select class="sort-select" id="sortSelect" onchange="applySort()">
      <option value="default">默认排序</option>
      <option value="traffic">总流量 ↓</option>
      <option value="upload">上传 ↓</option>
      <option value="download">下载 ↓</option>
      <option value="throttle">限速次数 ↓</option>
      <option value="status">限速优先</option>
    </select>
    <button class="btn-refresh" onclick="fetchData()">↺ 刷新</button>
  </div>
</header>

<!-- Summary bar -->
<div class="summary" id="summary">
  <div class="summary-item">
    <div class="summary-label">总服务器</div>
    <div class="summary-value blue" id="s-total">—</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">正常运行</div>
    <div class="summary-value green" id="s-normal">—</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">限速中</div>
    <div class="summary-value red" id="s-throttled">—</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">可用率</div>
    <div class="summary-value" id="s-avail">—</div>
  </div>
</div>

<!-- Main -->
<main class="main">
  <div class="grid" id="grid">
    <div class="state-box">
      <div class="loader"></div>
      <div>正在加载数据...</div>
    </div>
  </div>
</main>

<!-- Bottom bar -->
<div class="bottombar">
  <span id="lastUpdate">—</span>
  <div class="countdown">
    <span id="countdownLabel">10s</span>
    <div class="countdown-bar">
      <div class="countdown-fill" id="countdownFill" style="width:100%"></div>
    </div>
  </div>
</div>

<script>
const API_URL = '/api/status';
const INTERVAL = 10000;
let rawServers = [];
let countdown = INTERVAL / 1000;
let timer;

// ── Format helpers ─────────────────────────────────────────────

function fmtTraffic(tib) {
  if (tib >= 1)   return tib.toFixed(3) + ' TiB';
  if (tib >= 0.001) return (tib * 1024).toFixed(2) + ' GiB';
  return (tib * 1024 * 1024).toFixed(0) + ' MiB';
}

// ── Fetch ──────────────────────────────────────────────────────

async function fetchData() {
  resetCountdown();
  document.getElementById('liveDot').style.background = 'var(--yellow)';
  document.getElementById('liveLabel').textContent = 'SYNC';

  try {
    const res = await fetch(API_URL);
    const json = await res.json();
    if (json.success) {
      rawServers = json.data.servers || [];
      renderAll(json.data);
    }
  } catch (e) {
    document.getElementById('grid').innerHTML =
      `<div class="state-box">⚠ 加载失败，稍后重试</div>`;
  }

  document.getElementById('liveDot').style.background = 'var(--green)';
  document.getElementById('liveLabel').textContent = 'LIVE';
}

// ── Render ─────────────────────────────────────────────────────

function renderAll(data) {
  // Summary
  const total    = data.total_servers || 0;
  const normal   = data.normal_count  || 0;
  const throttled= data.throttled_count || 0;
  const avail    = total > 0 ? ((normal / total) * 100).toFixed(1) : '100';

  document.getElementById('s-total').textContent    = total;
  document.getElementById('s-normal').textContent   = normal;
  document.getElementById('s-throttled').textContent= throttled;

  const availEl = document.getElementById('s-avail');
  availEl.textContent = avail + '%';
  availEl.className = 'summary-value ' + (parseFloat(avail) >= 90 ? 'green' : parseFloat(avail) >= 70 ? 'yellow' : 'red');

  // Last update
  document.getElementById('lastUpdate').textContent = '最后更新 ' + (data.last_update || '—');

  // Grid
  renderGrid();
}

function getSort() {
  return document.getElementById('sortSelect').value;
}

function applySort() { renderGrid(); }

function renderGrid() {
  const sort = getSort();
  let servers = [...rawServers];

  if (sort === 'traffic')   servers.sort((a,b) => b.traffic_tib - a.traffic_tib);
  if (sort === 'upload')    servers.sort((a,b) => b.tx_tib - a.tx_tib);
  if (sort === 'download')  servers.sort((a,b) => b.rx_tib - a.rx_tib);
  if (sort === 'throttle')  servers.sort((a,b) => b.throttle_count - a.throttle_count);
  if (sort === 'status')    servers.sort((a,b) => (b.trafficThrottled ? 1 : 0) - (a.trafficThrottled ? 1 : 0));

  if (!servers.length) {
    document.getElementById('grid').innerHTML = `<div class="state-box">暂无数据</div>`;
    return;
  }

  document.getElementById('grid').innerHTML = servers.map(renderCard).join('');
}

function renderCard(s) {
  const throttled = s.trafficThrottled;

  // Status dot
  const stateUp  = (s.status || '').toLowerCase() === 'running';
  const stateLabel = s.status || 'UNKNOWN';

  // Throttle info
  const countLine  = s.throttle_count > 0
    ? `<span>${s.throttle_count} 次</span>`
    : `<span class="tinfo-value dim">—</span>`;

  const durationLabel = throttled ? '当前已限速' : '累计限速时长';
  const durationValue = throttled
    ? `<span class="tinfo-value alert">${s.current_throttle_duration || '—'}</span>`
    : `<span class="tinfo-value">${s.total_throttled_time || '—'}</span>`;

  const lastThrottle = s.last_throttle_time
    ? `<div class="tinfo"><div class="tinfo-label">上次限速</div><div class="tinfo-value dim" style="font-size:10px">${s.last_throttle_time}</div></div>`
    : '';

  const lastUnthrottle = s.last_unthrottle_time
    ? `<div class="tinfo"><div class="tinfo-label">解除限速</div><div class="tinfo-value dim" style="font-size:10px">${s.last_unthrottle_time}</div></div>`
    : '';

  return `
<div class="card ${throttled ? 'throttled' : ''}">
  <div class="card-head">
    <div>
      <div class="card-name">${s.server_name || '—'}</div>
      <div class="card-meta">
        <span class="card-ip">${s.ipv4IP || '—'}</span>
        <span class="card-account">${s.account_id || ''}</span>
      </div>
    </div>
    <span class="tag ${throttled ? 'throttled' : 'normal'}">${throttled ? '限速' : '正常'}</span>
  </div>

  <div class="card-stats">
    <div class="stat">
      <div class="stat-label">总流量</div>
      <div class="stat-value">${fmtTraffic(s.traffic_tib || 0)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">↑ 上传</div>
      <div class="stat-value up">${fmtTraffic(s.tx_tib || 0)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">↓ 下载</div>
      <div class="stat-value down">${fmtTraffic(s.rx_tib || 0)}</div>
    </div>
  </div>

  <div class="card-throttle">
    <div class="tinfo">
      <div class="tinfo-label">限速次数</div>
      <div class="tinfo-value ${s.throttle_count > 0 ? '' : 'dim'}">${s.throttle_count > 0 ? s.throttle_count + ' 次' : '—'}</div>
    </div>
    <div class="tinfo">
      <div class="tinfo-label">${durationLabel}</div>
      ${durationValue}
    </div>
    ${lastThrottle}
    ${lastUnthrottle}
  </div>

  <div class="card-foot">
    <div class="foot-status">
      <div class="dot-status ${stateUp ? 'on' : 'off'}"></div>
      <span>${stateLabel}</span>
    </div>
  </div>
</div>`;
}

// ── Countdown ──────────────────────────────────────────────────

function resetCountdown() {
  clearInterval(timer);
  countdown = INTERVAL / 1000;
  tick();
  timer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      fetchData();
    } else {
      tick();
    }
  }, 1000);
}

function tick() {
  const pct = (countdown / (INTERVAL / 1000)) * 100;
  document.getElementById('countdownFill').style.width = pct + '%';
  document.getElementById('countdownLabel').textContent = countdown + 's';
}

// ── Init ───────────────────────────────────────────────────────
fetchData();
</script>
</body>
</html>
